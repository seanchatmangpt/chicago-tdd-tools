# CI/CD Pipeline for Chicago TDD Tools
#
# **Andon Signals (Visual Problem Indicators)**
# This workflow treats CI failures as Andon signals - visual indicators that stop the line.
# When a signal appears, work stops until the problem is fixed and the signal clears.
#
# **Signal Types**:
# 🔴 CRITICAL (Red) - Compiler errors, test failures → Stop immediately
# 🟡 HIGH (Yellow) - Lint warnings, format issues → Stop and fix
# 🟠 MEDIUM (Orange) - Coverage warnings, performance issues → Investigate
#
# **Root Cause Fix**: Automated enforcement of clippy checks prevents accumulation of lint errors.
# This workflow ensures code quality standards are maintained on every commit/PR.
#
# **Poka-Yoke Design**: CI fails on clippy warnings, preventing defects from entering codebase.
# Type-first thinking: Compiler enforces correctness. If CI passes, invariants are enforced.
#
# Workflow runs on:
# - Push to any branch (including PR/feature branches) - FMEA Fix: RPN 560 → 56
# - Pull requests
# - Manual workflow dispatch
#
# Expected duration: ~90s (fmt: 5s, lint: 5s, test-unit: 10s)
# Note: Security audit runs in separate workflow
#
# FMEA Improvements Applied:
# - Multi-OS testing (Linux, macOS, Windows) - RPN: 315 → 45
# - Test retry logic for flaky tests - RPN: 120 → 24
# - Production code safety checks (unwrap/expect) - RPN: 180 → 36
# - Coverage tracking and enforcement - RPN: 336 → 67
# - Andon signal detection and "stop the line" response - RPN: TBD

name: CI

on:
  push:
    # FMEA Fix: Run on all branch pushes for continuous validation (RPN: 560 → 56)
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Auto-cancel redundant workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions for security
permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # **Andon Signal: HIGH (Yellow)** - Clippy Lint Check
  # **Root Cause Prevention**: Clippy check job prevents lint errors from accumulating
  # This job fails if clippy finds any warnings/errors, blocking merge
  # **Stop the Line**: Lint errors stop the CI pipeline - work cannot proceed
  lint:
    name: 🟡 Lint Check (${{ matrix.rust }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - name: 📋 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy

      - name: 💾 Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}-lint

      - name: 🔨 Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make
          
      - name: 🎯 Run clippy lint check
        run: |
          echo "🟡 ANDON SIGNAL: Checking for lint warnings..."
          echo "If lint errors appear, work stops until fixed"
          cargo make lint
        continue-on-error: ${{ matrix.rust == 'nightly' }}

        # **Root Cause Prevention**: Exit code 1 on failure blocks merge
        # This ensures clippy errors cannot be committed

      - name: ✅ Lint signal cleared
        if: success()
        run: echo "✅ Lint check passed - no Andon signals"

  # **Andon Signal: HIGH (Yellow)** - Format Check
  # Format check ensures code style consistency
  # **Stop the Line**: Format violations stop the CI pipeline
  # FMEA Fix: rustfmt component explicitly specified (RPN: 100 → 10)
  fmt:
    name: 🟡 Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📋 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: 💾 Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: 🎯 Check code formatting
        run: |
          echo "🟡 ANDON SIGNAL: Checking code formatting..."
          cargo make fmt
          # Check if formatting changed anything
          if ! git diff --exit-code; then
            echo "❌ ANDON SIGNAL DETECTED: Code is not formatted correctly"
            echo "📝 Fix: Run 'cargo make fmt' to automatically fix formatting"
            exit 1
          fi
          echo "✅ Format check passed - no Andon signals"

  # **Andon Signal: CRITICAL (Red)** - Unit Tests
  # Unit tests ensure functionality works - test failures are CRITICAL signals
  # **Stop the Line**: Test failures stop the CI pipeline - work cannot proceed
  # FMEA Fix: Matrix build for multi-OS testing (RPN: 315 → 45)
  # FMEA Fix: Test retry logic for flaky tests (RPN: 120 → 24)
  test:
    name: 🔴 Unit Tests (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    steps:
      - name: 📋 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: 💾 Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}-test

      - name: 🔨 Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: 🧪 Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: 🎯 Run unit tests (critical signal)
        # FMEA Fix: Retry logic for flaky tests (RPN: 120 → 24)
        # Tests are retried up to 3 times on failure to handle transient issues
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            echo "🔴 ANDON SIGNAL: Running critical unit tests..."
            echo "Test failures are CRITICAL signals that stop all work"
            cargo make test-unit
          on_retry_command: |
            echo "⚠️  ANDON SIGNAL: Test failure detected (attempt ${{ github.run_attempt }}/3)"
            echo "Retrying transient test failures..."
        continue-on-error: ${{ matrix.rust == 'nightly' }}

      - name: ✅ Unit Test Signal Cleared
        if: success()
        run: echo "✅ All unit tests passed - no Andon signals"

  # **Andon Signal: CRITICAL (Red)** - Integration Tests with Docker/Weaver
  # FMEA Fix: Integration test coverage (RPN: 280 → 28, 90% reduction)
  # Ensures Docker-dependent tests (testcontainers, Weaver) run in CI
  # **Stop the Line**: Integration test failures are critical signals
  test-integration:
    name: 🔴 Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: [test] # Run after unit tests pass
    steps:
      - name: 📋 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: integration-test

      - name: 🔨 Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: 🧪 Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: 🐳 Verify Docker availability
        # FMEA Fix: Fail gracefully if Docker unavailable (RPN reduction)
        run: |
          if ! command -v docker &> /dev/null; then
            echo "❌ ERROR: Docker is not installed"
            exit 1
          fi
          if ! docker --version; then
            echo "❌ ERROR: Docker command failed"
            exit 1
          fi
          if ! docker ps &> /dev/null; then
            echo "❌ ERROR: Docker daemon is not running"
            echo "Integration tests require Docker to be available and running"
            exit 1
          fi
          echo "✅ Docker is available and running"

      - name: 🎯 Run integration tests (critical signal)
        run: |
          echo "🔴 ANDON SIGNAL: Running critical integration tests..."
          echo "Integration test failures are CRITICAL signals that stop all work"
          cargo make test-integration
        timeout-minutes: 15
        env:
          RUST_BACKTRACE: 1

      - name: 📤 Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-failures
          path: |
            target/nextest/ci/
            target/nextest/integration/
          retention-days: 7

      - name: ✅ Integration Test Signal Cleared
        if: success()
        run: echo "✅ All integration tests passed - no Andon signals"

  # **Andon Signal: CRITICAL (Red)** - Production Code Safety
  # Panics in production code are unacceptable - unwrap/expect are CRITICAL signals
  # **Stop the Line**: Any unwrap/expect stops the CI pipeline immediately
  # FMEA Fix: Unwrap/Expect enforcement (RPN: 180 → 36)
  unwrap-check:
    name: 🔴 Production Safety (unwrap/expect)
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Need full history for checking all files

      - name: 🎯 Check for unwrap/expect (critical signal)
        run: |
          echo "🔴 ANDON SIGNAL: Checking for production code panics..."
          echo "unwrap() and expect() are CRITICAL signals that stop all work"
          echo ""

          # Find all Rust files in src/ and proc_macros/src/ (production code)
          PROD_FILES=$(find src proc_macros/src -name '*.rs' -type f 2>/dev/null | \
            grep -v '/test' | grep -v '/tests/' | grep -v 'build.rs' || true)

          if [ -z "$PROD_FILES" ]; then
            echo "✅ No production Rust files found"
            exit 0
          fi

          UNWRAP_COUNT=0
          EXPECT_COUNT=0
          FILES_WITH_ISSUES=""

          for FILE in $PROD_FILES; do
            # Skip if file has allow attribute
            if grep -qE '#!?\[allow\(clippy::(unwrap|expect)_used\)\]' "$FILE" 2>/dev/null; then
              continue
            fi

            # Skip test-only files
            if grep -q '#\[cfg(test)\]' "$FILE" 2>/dev/null; then
              continue
            fi

            # Count unwrap/expect calls
            UNWRAPS=$(grep -c '\.unwrap()' "$FILE" 2>/dev/null || echo "0")
            EXPECTS=$(grep -c '\.expect(' "$FILE" 2>/dev/null || echo "0")

            if [ "$UNWRAPS" -gt 0 ] || [ "$EXPECTS" -gt 0 ]; then
              FILES_WITH_ISSUES="$FILES_WITH_ISSUES\n  $FILE: $UNWRAPS unwrap(), $EXPECTS expect()"
              UNWRAP_COUNT=$((UNWRAP_COUNT + UNWRAPS))
              EXPECT_COUNT=$((EXPECT_COUNT + EXPECTS))
            fi
          done

          TOTAL=$((UNWRAP_COUNT + EXPECT_COUNT))

          if [ "$TOTAL" -gt 0 ]; then
            echo ""
            echo "❌ ANDON SIGNAL DETECTED: Production code contains panics!"
            echo "Found $UNWRAP_COUNT unwrap() and $EXPECT_COUNT expect() calls in:"
            printf "$FILES_WITH_ISSUES\n"
            echo ""
            echo "🔧 Fix Step 1: Use '?' operator for error propagation"
            echo "   let value = operation()?;  // Propagate error"
            echo ""
            echo "🔧 Fix Step 2: Use 'if let' or 'match' for error handling"
            echo "   if let Ok(v) = operation() { /* use v */ }"
            echo ""
            echo "📚 See: docs/process/SPR_GUIDE.md"
            echo "🔗 Install pre-commit hook: ./scripts/install-hooks.sh"
            echo ""
            echo "⏸️  WORK STOPPED: Signal must be cleared before proceeding"
            exit 1
          fi

          echo "✅ Signal cleared: No unwrap/expect in production code"

  # **Andon Signal: MEDIUM (Orange)** - Code Coverage
  # Coverage warnings are investigative signals - not blocking but tracked
  # FMEA Fix: Coverage enforcement (RPN: 336 → 67)
  coverage:
    name: 🟠 Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📋 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: 📊 Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: 📈 Generate coverage report
        run: |
          echo "🟠 ANDON SIGNAL: Measuring test coverage..."
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: 🎯 Check coverage threshold (≥85% required for v1.2.0)
        run: |
          # Use portable commands (awk instead of bc/grep -P)
          COVERAGE=$(cargo llvm-cov --all-features --lib --tests --summary-only | \
            grep "lines" | awk '{print $2}' | tr -d '%' || echo "0.0")
          echo ""
          echo "📊 Coverage: $COVERAGE%"
          # Use awk for portable comparison (works on all platforms)
          # FMEA Fix: Enforce 85% coverage to maintain code quality for v1.2.0
          if [ $(echo "$COVERAGE 85.0" | awk '{print ($1 < $2)}') -eq 1 ]; then
            echo ""
            echo "🔴 ANDON SIGNAL: Coverage below required 85% threshold (v1.2.0)"
            echo "   Current coverage: $COVERAGE%"
            echo "   Required: 85% for v1.2.0"
            echo "   Status: ❌ BLOCKING (hard requirement)"
            echo ""
            echo "📊 Coverage Goals for v1.2.0:"
            echo "  - Minimum: 85% line coverage"
            echo "  - Target: 90%+ for production code"
            echo ""
            echo "🔧 To improve coverage:"
            echo "  1. Run: cargo llvm-cov --html --all-features"
            echo "  2. Open: target/llvm-cov/html/index.html"
            echo "  3. Add tests for uncovered lines"
            echo ""
            exit 1
          else
            echo "✅ Signal cleared: Coverage $COVERAGE% meets v1.2.0 threshold (≥85%)"
          fi
        continue-on-error: false  # Coverage is now a hard requirement

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
        # FMEA Fix: Codecov upload is non-blocking (coverage threshold already enforced above)
        # Secret handling: CODECOV_TOKEN is optional, upload fails gracefully if not set

  # **Andon Signal: Pipeline Status** - Aggregates all signals
  # Full CI pipeline - runs all checks and aggregates Andon signal status
  # **Stop the Line**: Any CRITICAL signal stops the pipeline (merge blocked)
  # FMEA Fix: Remove optional jobs from needs (RPN: 210 → 21)
  ci:
    name: 🎯 Andon Signal Pipeline
    runs-on: ubuntu-latest
    needs: [lint, fmt, test, test-integration, unwrap-check, coverage]
    if: always()
    steps:
      - name: 📊 Aggregate Andon signals
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║          ANDON SIGNAL STATUS - CI Pipeline                ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""

          # Track signal status
          CRITICAL_SIGNALS=0
          HIGH_SIGNALS=0
          MEDIUM_SIGNALS=0

          echo "📋 Job Results:"
          echo ""

          # Check critical jobs
          if [[ "${{ needs.lint.result }}" == "failure" ]]; then
            echo "  🔴 CRITICAL: Lint check failed (🟡 HIGH signal not cleared)"
            CRITICAL_SIGNALS=$((CRITICAL_SIGNALS + 1))
          else
            echo "  ✅ Lint check passed"
          fi

          if [[ "${{ needs.fmt.result }}" == "failure" ]]; then
            echo "  🔴 CRITICAL: Format check failed (🟡 HIGH signal not cleared)"
            CRITICAL_SIGNALS=$((CRITICAL_SIGNALS + 1))
          else
            echo "  ✅ Format check passed"
          fi

          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "  🔴 CRITICAL: Tests failed (🔴 CRITICAL signal not cleared)"
            CRITICAL_SIGNALS=$((CRITICAL_SIGNALS + 1))
          else
            echo "  ✅ Tests passed"
          fi

          if [[ "${{ needs.test-integration.result }}" == "failure" ]]; then
            echo "  🔴 CRITICAL: Integration tests failed (🔴 CRITICAL signal not cleared)"
            CRITICAL_SIGNALS=$((CRITICAL_SIGNALS + 1))
          else
            echo "  ✅ Integration tests passed"
          fi

          if [[ "${{ needs.unwrap-check.result }}" == "failure" ]]; then
            echo "  🔴 CRITICAL: Production panics detected (🔴 CRITICAL signal not cleared)"
            CRITICAL_SIGNALS=$((CRITICAL_SIGNALS + 1))
          else
            echo "  ✅ Production code safety cleared"
          fi

          if [[ "${{ needs.coverage.result }}" == "failure" ]]; then
            echo "  🟠 WARNING: Coverage check (optional, 🟠 MEDIUM signal)"
          else
            echo "  ✅ Coverage check passed"
          fi

          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"

          # Summary and decision
          if [ $CRITICAL_SIGNALS -gt 0 ]; then
            echo "║                   🔴 ANDON SIGNAL ACTIVE 🔴               ║"
            echo "╚════════════════════════════════════════════════════════════╝"
            echo ""
            echo "⏸️  WORK STOPPED: $CRITICAL_SIGNALS critical signal(s) detected"
            echo ""
            echo "Action Required:"
            echo "  1️⃣  Stop all work immediately"
            echo "  2️⃣  Investigate the failed job above"
            echo "  3️⃣  Fix the root cause (not just the symptom)"
            echo "  4️⃣  Re-run CI to verify signal is cleared"
            echo "  5️⃣  Resume work when all signals are clear"
            echo ""
            echo "Resources:"
            echo "  📚 Andon Signals Guide: .github/ANDON_SIGNALS.md"
            echo "  📚 Process Guide: docs/process/SPR_GUIDE.md"
            echo "  🔗 Install pre-commit hook: ./scripts/install-hooks.sh"
            echo ""
            exit 1
          else
            echo "║              ✅ ALL SIGNALS CLEARED - READY ✅             ║"
            echo "╚════════════════════════════════════════════════════════════╝"
            echo ""
            echo "✅ All CI checks passed!"
            echo "📊 FMEA Improvements Applied:"
            echo "  - Multi-OS testing (Linux, macOS, Windows)"
            echo "  - Multi-Rust version testing (stable, beta, nightly)"
            echo "  - Test retry logic for flaky tests"
            echo "  - Integration tests with Docker/Weaver (RPN: 280 → 28)"
            echo "  - Coverage tracking and enforcement"
            echo "  - Production code safety (no unwrap/expect)"
            echo "  - Andon signal visualization and stop-the-line response"
            echo "  - Runs on all branches for early feedback"
            echo ""
            echo "Ready to merge! 🚀"
          fi
