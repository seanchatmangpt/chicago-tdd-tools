# Makefile.toml for proc_macros
# Minimal stubs so cargo make workspace iteration does not fail.

[tasks.lint]
description = "Run clippy on proc macros"
command = "cargo"
args = ["clippy", "--manifest-path", "Cargo.toml", "--", "-D", "warnings"]

[tasks.fmt]
description = "Format proc macros"
command = "cargo"
args = ["fmt", "--manifest-path", "Cargo.toml"]

[tasks.test-unit]
description = "Run proc macro tests (lib only, skip broken doc tests)"
command = "cargo"
args = ["test", "--manifest-path", "Cargo.toml", "--lib"]

[tasks.docs-check]
description = "No-op: proc_macros has no mdbook documentation"
script = ["echo '✅ docs-check: skipped for proc_macros'"]

[tasks.spec]
description = "No-op for proc_macros"
script = ["echo '✅ spec: skipped for proc_macros'"]

[tasks.spec-check]
description = "No-op for proc_macros"
script = ["echo '✅ spec-check: skipped for proc_macros'"]
